<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo | EducaPlay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <style>
        .module-header {
            padding: 40px 0;
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 0.875rem;
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg-card);
        }

        .back-btn:hover {
            color: var(--text-main);
            border-color: var(--text-muted);
        }

        .module-content {
            display: flex;
            justify-content: center;
            margin-bottom: 80px;
        }

        .download-card {
            width: 100%;
            max-width: 450px;
            padding: 32px;
            text-align: center;
        }

        .download-cover {
            width: 100%;
            aspect-ratio: 4/5;
            background: #27272a;
            border-radius: var(--radius-md);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 900px) {
            .download-card {
                position: static;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="module-header">
            <a href="dashboard.html" class="back-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>
                Voltar para Meus Materiais
            </a>
            <h1 class="heading-font">Módulo: 450 Atividades sobre pronomes</h1>
        </div>

        <div class="module-content">
            <div class="card download-card">
                <div class="download-cover">
                    <img src="https://imgur.com/IlMfzpi.png" alt="Capa 450 Atividades sobre pronomes"
                        style="width:100%; height:100%; object-fit: cover; border-radius: var(--radius-md);">
                </div>
                <h3 style="margin-bottom: 20px;">Download do PDF</h3>
                <!-- Substitua o href pelo link do seu arquivo PDF -->
                <a href="450_Atividades_sobre_pronomes.pdf" download="450_Atividades_sobre_pronomes.pdf" class="btn-primary"
                    style="box-shadow: 0 0 20px rgba(255, 122, 34, 0.4);">
                    BAIXAR MATERIAL COMPLETO (PDF)
                </a>
            </div>
        </div>
    </div>

    <footer style="margin-top: 100px;">
        <div class="container">
            <p>&copy; 2026 EducaPlay. Todos os direitos reservados.</p>
        </div>
    </footer>
</body>

</html>
